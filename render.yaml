services:
  - type: web
    name: sporti-app
    env: node
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sporti-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

databases:
  - name: sporti-db
    databaseName: sport
    user: sporti_user
    plan: free